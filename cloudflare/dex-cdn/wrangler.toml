# TitoDex Dex CDN Worker
# Deploy via Cloudflare Workers Builds → branch: deploy/dex-cdn
# See DEPLOY.md for Dashboard setup.

name = "tito-dex"
main = "src/worker.js"
compatibility_date = "2026-07-23"

# Set in Dashboard → Settings → Variables, or uncomment after first deploy:
# account_id = "YOUR_ACCOUNT_ID"

[[r2_buckets]]
binding = "DEX_BUCKET"
bucket_name = "titodex-dex"

# Dedicated TitoDex KV (never reuse the unrelated FODI_CACHE namespace).
[[kv_namespaces]]
binding = "MANIFEST_KV"
id = "38305ab2b6b249079241407b5e1e0366"

# Custom domain — zone tito.cafe must be on this Cloudflare account.
[[routes]]
pattern = "dex.tito.cafe/*"
zone_name = "tito.cafe"

[triggers]
crons = ["0 4 * * 0", "0 */6 * * *"]

[vars]
CDN_VERSION = "4"
CDN_BASE_URL = "https://dex.tito.cafe"
DEPLOY_REV = "2026-07-23-v4"
GITHUB_REPO = "Tito-XD/tito-dex"

# Secrets (Dashboard → Settings → Variables → Secrets):
#   GITHUB_DISPATCH_TOKEN — PAT with repo scope (Actions: write) for repository_dispatch
#   ADMIN_SECRET          — Bearer token for /admin/* routes
#   TELEGRAM_BOT_TOKEN    — optional BotFather token for probe/cron alerts
#   TELEGRAM_CHAT_ID      — optional Telegram chat id (your user or group)
#   ALERT_WEBHOOK_URL     — optional Discord/Slack webhook (alternative to Telegram)
