name: Sync l10n Catalog from 52poke

on:
  workflow_dispatch:
    inputs:
      force_full:
        description: Re-resolve all slugs lacking proper Chinese labels
        type: boolean
        default: false
  repository_dispatch:
    types: [sync-l10n]

jobs:
  sync-l10n:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install beautifulsoup4 -r tools/dex_bundle_requirements.txt

      - name: Fetch 52poke location labels (incremental)
        env:
          FORCE_FULL: ${{ github.event.client_payload.force_full || inputs.force_full || false }}
          DISPATCH_SOURCE: ${{ github.event.client_payload.source || 'manual' }}
        run: |
          echo "Trigger source: ${DISPATCH_SOURCE}"
          EXTRA=""
          if [ "$FORCE_FULL" = "true" ]; then
            EXTRA="--force-full"
          fi
          python3 tools/fetch_52poke_location_zh.py --limit 50 $EXTRA || true

      - name: Regenerate compact l10n assets
        run: python3 tools/generate_zh_catalog_assets.py

      - name: Stage l10n upload slice
        run: python3 tools/stage_l10n_upload.py --output dist/l10n-upload

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Verify Cloudflare R2 token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd cloudflare/dex-cdn
          npm ci
          npx wrangler r2 bucket list
          echo "R2 token OK (see docs/PERMISSIONS.md if this step 403s)"

      - name: Upload l10n slice to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd cloudflare/dex-cdn
          npm ci

          WR="npx wrangler r2 object put --remote"

          # l10n/zh/*.json
          L10N=../../dist/l10n-upload/v5/l10n/zh
          for f in "$L10N"/*.json; do
            base=$(basename "$f")
            $WR "titodex-dex/v5/l10n/zh/$base" \
              --file="$f" \
              --content-type=application/json
          done

          # maps + config
          $WR titodex-dex/v5/maps/hgss_map_list.json \
            --file=../../dist/l10n-upload/v5/maps/hgss_map_list.json \
            --content-type=application/json

          $WR titodex-dex/v5/config/app_config.json \
            --file=../../dist/l10n-upload/v5/config/app_config.json \
            --content-type=application/json

          # Root bundle-manifest.json — bump l10nVersion + publishedAt
          $WR titodex-dex/bundle-manifest.json \
            --file=../../dist/l10n-upload/bundle-manifest.json \
            --content-type=application/json

      - name: Verify CDN l10n upload
        run: |
          curl -sfI https://dex.tito.cafe/v5/l10n/zh/manifest.json | head -5
          curl -sf https://dex.tito.cafe/v5/l10n/zh/manifest.json | python3 -c "
          import json, sys
          m = json.load(sys.stdin)
          assert m.get('generatedAt'), f'unexpected l10n manifest: {m}'
          print('l10n manifest generatedAt:', m['generatedAt'])
          "
          curl -sf https://dex.tito.cafe/bundle-manifest.json | python3 -c "
          import json, sys
          m = json.load(sys.stdin)
          assert m.get('l10nVersion'), f'missing l10nVersion: {m}'
          print('bundle-manifest l10nVersion:', m['l10nVersion'])
          "
          curl -sf 'https://dex.tito.cafe/cdn-health?probe=1' | python3 -c "
          import json, sys
          h = json.load(sys.stdin)
          assert h.get('ok'), h
          print('cdn-health probe ok')
          "

      - name: Commit catalog changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/l10n/zh/location_areas.json; then
            echo "No location_areas.json changes — skip git commit."
            exit 0
          fi
          git add data/l10n/zh/ flutter/assets/l10n/zh/
          git commit -m "chore(l10n): 52poke location label updates"
          git push
