name: Sync l10n Catalog from 52poke

on:
  workflow_dispatch:
    inputs:
      force_full:
        description: Re-resolve all slugs lacking proper Chinese labels
        type: boolean
        default: false
  schedule:
    - cron: "0 4 * * 0"

jobs:
  sync-l10n:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install beautifulsoup4 -r tools/dex_bundle_requirements.txt

      - name: Fetch 52poke location labels (incremental)
        run: |
          EXTRA=""
          if [ "${{ inputs.force_full }}" = "true" ]; then
            EXTRA="--force-full"
          fi
          python3 tools/fetch_52poke_location_zh.py --limit 50 $EXTRA || true

      - name: Regenerate compact l10n assets
        run: python3 tools/generate_zh_catalog_assets.py

      - name: Stage l10n upload slice
        run: python3 tools/stage_l10n_upload.py --output dist/l10n-upload

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Upload l10n slice to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd cloudflare/dex-cdn
          npm ci

          # l10n/zh/*.json
          L10N=../../dist/l10n-upload/v3/l10n/zh
          for f in "$L10N"/*.json; do
            base=$(basename "$f")
            npx wrangler r2 object put "titodex-dex/v3/l10n/zh/$base" \
              --file="$f" \
              --content-type=application/json
          done

          # maps + config (if changed)
          npx wrangler r2 object put titodex-dex/v3/maps/hgss_map_list.json \
            --file=../../dist/l10n-upload/v3/maps/hgss_map_list.json \
            --content-type=application/json

          npx wrangler r2 object put titodex-dex/v3/config/app_config.json \
            --file=../../dist/l10n-upload/v3/config/app_config.json \
            --content-type=application/json

          # Root bundle-manifest.json — bump l10nVersion + publishedAt
          npx wrangler r2 object put titodex-dex/bundle-manifest.json \
            --file=../../dist/l10n-upload/bundle-manifest.json \
            --content-type=application/json

      - name: Commit catalog changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/l10n/zh/ flutter/assets/l10n/zh/
          if git diff --staged --quiet; then
            echo "No catalog changes to commit."
          else
            git commit -m "chore(l10n): weekly 52poke location sync"
            git push || echo "Push skipped (no write token or fork)."
          fi
