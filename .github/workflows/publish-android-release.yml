name: Publish Verified Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Product version without the leading v
        required: true
        type: string
      source_sha:
        description: Exact verified main commit to tag
        required: true
        type: string
      build_run_id:
        description: Successful Android Release APKs workflow run
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  verify-and-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact release source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Set up Java for apksigner
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download verified APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: TitoDex-${{ inputs.version }}-*-rg-arm64.apk
          path: dist/release
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.build_run_id }}

      - name: Reverify APK contents and signatures
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          lite="dist/release/TitoDex-$VERSION-lite-rg-arm64.apk"
          offline="dist/release/TitoDex-$VERSION-offline-rg-arm64.apk"
          tools/verify_release_apk.sh "$lite"
          tools/verify_release_apk.sh --offline "$offline"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$apksigner"
          "$apksigner" verify --verbose --print-certs "$lite"
          "$apksigner" verify --verbose --print-certs "$offline"
          sha256sum "$lite" "$offline" | tee dist/release/SHA256SUMS.txt

      - name: Create annotated tag and draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          tag="v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" "$SOURCE_SHA" -m "TitoDex $tag"
          git push origin "refs/tags/$tag"
          cat > /tmp/release-notes.md <<EOF
          这次补丁修复图鉴图片与长页面导航，并更新完整离线图鉴包。

          ### 主要更新

          - 恢复 1025 个默认图鉴的清晰图片，不再把 80×80 像素图误作默认立绘。
          - 形态切换精简为 chips；切换形态后可继续查看该形态实际存在的历代 sprite。
          - 精确出现版本改为下拉菜单，保留版本与 DLC 的独立地点数据。
          - 二级页面标题栏固定；长图鉴页增加快速回顶。
          - Offline APK 内置与在线下载相同、经 SHA-256 验证的 v7 图鉴归档；Lite APK 可按需下载。
          - v7 完整复用 v6 的 1025 物种、803 形态及全部出现地点，仅增量修复媒体和形态 sprite 元数据。

          ### 下载说明

          - `TitoDex-$VERSION-lite-rg-arm64.apk`：推荐版本，按需下载离线图鉴。
          - `TitoDex-$VERSION-offline-rg-arm64.apk`：内置完整离线图鉴，文件更大。

          两个 APK 均仅包含 arm64-v8a Release 运行库。
          EOF
          {
            printf '\n### SHA-256\n\n```text\n'
            cat dist/release/SHA256SUMS.txt
            printf '```\n'
          } >> /tmp/release-notes.md
          gh release create "$tag" \
            "dist/release/TitoDex-$VERSION-lite-rg-arm64.apk" \
            "dist/release/TitoDex-$VERSION-offline-rg-arm64.apk" \
            --verify-tag \
            --draft \
            --title "TitoDex $tag · 清晰图鉴与固定导航" \
            --notes-file /tmp/release-notes.md
