name: Publish Verified Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Product version without the leading v
        required: true
        type: string
      source_sha:
        description: Exact verified main commit to tag
        required: true
        type: string
      build_run_id:
        description: Successful Android Release APKs workflow run
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  verify-and-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact release source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Set up Java for apksigner
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download verified APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: TitoDex-${{ inputs.version }}-*-rg-arm64.apk
          path: dist/release
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.build_run_id }}

      - name: Reverify APK contents and signatures
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          lite="dist/release/TitoDex-$VERSION-lite-rg-arm64.apk"
          offline="dist/release/TitoDex-$VERSION-offline-rg-arm64.apk"
          tools/verify_release_apk.sh "$lite"
          tools/verify_release_apk.sh --offline "$offline"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$apksigner"
          "$apksigner" verify --verbose --print-certs "$lite"
          "$apksigner" verify --verbose --print-certs "$offline"
          sha256sum "$lite" "$offline" | tee dist/release/SHA256SUMS.txt

      - name: Create annotated tag and draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          tag="v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" "$SOURCE_SHA" -m "TitoDex $tag"
          git push origin "refs/tags/$tag"
          cat > /tmp/release-notes.md <<'EOF'
          这次更新补全了图鉴形态系统和跨世代出现地点，并发布全新的完整离线图鉴包。

          ### 主要更新

          - 图鉴可搜索和切换地区形态、超级进化、超极巨化、战斗形态及其他具有独立资料的形态。
          - 形态切换会同步更新属性、种族值、特性、招式、身高体重、图片和出现地点，不再错误借用默认形态资料。
          - 出现地点支持精确到单独版本和 DLC，并补充现代作品的野外、固定、团体战、头目、霸主及大量出现记录。
          - 形态地点映射保留宝可梦实体、形态、太晶属性和无法确认形态等身份信息，避免把模糊记录错误归给默认形态。
          - Offline APK 内置与在线下载相同、经 SHA-256 验证的 v6 图鉴归档；Lite APK 可按需下载。
          - 合并并验证 iOS 平台源码；本次 Release 只提供 Android arm64-v8a Lite 与 Offline APK。

          ### 下载说明

          - `TitoDex-0.7.0-lite-rg-arm64.apk`：推荐版本，按需下载离线图鉴。
          - `TitoDex-0.7.0-offline-rg-arm64.apk`：内置完整离线图鉴，文件更大。

          两个 APK 均仅包含 arm64-v8a Release 运行库。
          EOF
          {
            printf '\n### SHA-256\n\n```text\n'
            cat dist/release/SHA256SUMS.txt
            printf '```\n'
          } >> /tmp/release-notes.md
          gh release create "$tag" \
            "dist/release/TitoDex-$VERSION-lite-rg-arm64.apk" \
            "dist/release/TitoDex-$VERSION-offline-rg-arm64.apk" \
            --verify-tag \
            --draft \
            --title "TitoDex $tag · 完整形态与现代地点" \
            --notes-file /tmp/release-notes.md
